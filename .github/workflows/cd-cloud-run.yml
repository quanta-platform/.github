name: CD — Cloud Run

on:
  workflow_call:
    inputs:
      service-name:
        description: Cloud Run service name
        type: string
        required: true
      dockerfile:
        description: Path to Dockerfile (relative to repo root)
        type: string
        default: "Dockerfile"
      node-version:
        type: string
        default: "22"
      skip-e2e:
        description: Skip E2E test trigger after QA deploy
        type: boolean
        default: false
      skip-promote:
        description: Skip the promote-to-main job (E2E polling + auto-merge)
        type: boolean
        default: true
    secrets:
      GCP_QA_PROJECT_ID:
        required: false
      GCP_PROD_PROJECT_ID:
        required: false
      GCP_QA_SA_KEY:
        required: false
      GCP_PROD_SA_KEY:
        required: false
      GCP_REGION:
        required: false
      APP_ID:
        required: false
      APP_PRIVATE_KEY:
        required: false
      # Firebase client config (public values, passed as build args for Next.js)
      FIREBASE_QA_API_KEY:
        required: false
      FIREBASE_QA_AUTH_DOMAIN:
        required: false
      FIREBASE_QA_PROJECT_ID:
        required: false
      FIREBASE_PROD_API_KEY:
        required: false
      FIREBASE_PROD_AUTH_DOMAIN:
        required: false
      FIREBASE_PROD_PROJECT_ID:
        required: false
      QA_API_URL:
        required: false
      PROD_API_URL:
        required: false

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: |
          echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
            echo "project_id=${{ secrets.GCP_PROD_PROJECT_ID }}" >> "$GITHUB_OUTPUT"
            echo "firebase_api_key=${{ secrets.FIREBASE_PROD_API_KEY }}" >> "$GITHUB_OUTPUT"
            echo "firebase_auth_domain=${{ secrets.FIREBASE_PROD_AUTH_DOMAIN }}" >> "$GITHUB_OUTPUT"
            echo "firebase_project_id=${{ secrets.FIREBASE_PROD_PROJECT_ID }}" >> "$GITHUB_OUTPUT"
            echo "api_url=${{ secrets.PROD_API_URL }}" >> "$GITHUB_OUTPUT"
          else
            echo "environment=qa" >> "$GITHUB_OUTPUT"
            echo "project_id=${{ secrets.GCP_QA_PROJECT_ID }}" >> "$GITHUB_OUTPUT"
            echo "firebase_api_key=${{ secrets.FIREBASE_QA_API_KEY }}" >> "$GITHUB_OUTPUT"
            echo "firebase_auth_domain=${{ secrets.FIREBASE_QA_AUTH_DOMAIN }}" >> "$GITHUB_OUTPUT"
            echo "firebase_project_id=${{ secrets.FIREBASE_QA_PROJECT_ID }}" >> "$GITHUB_OUTPUT"
            echo "api_url=${{ secrets.QA_API_URL }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ github.ref == 'refs/heads/main' && secrets.GCP_PROD_SA_KEY || secrets.GCP_QA_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        env:
          IMAGE: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ steps.env.outputs.project_id }}/quanta-docker/${{ inputs.service-name }}
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          build-args: |
            NEXT_PUBLIC_FIREBASE_API_KEY=${{ steps.env.outputs.firebase_api_key }}
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ steps.env.outputs.firebase_auth_domain }}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ steps.env.outputs.firebase_project_id }}
            NEXT_PUBLIC_API_URL=${{ steps.env.outputs.api_url }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max

  deploy-qa:
    name: Deploy to QA
    needs: build-and-push
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: qa
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_QA_SA_KEY }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ inputs.service-name }}
          image: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_QA_PROJECT_ID }}/quanta-docker/${{ inputs.service-name }}:${{ github.sha }}
          region: ${{ secrets.GCP_REGION }}

      - name: Verify deployment
        id: verify
        run: |
          URL=$(gcloud run services describe ${{ inputs.service-name }} --region=${{ secrets.GCP_REGION }} --format='value(status.url)' --project=${{ secrets.GCP_QA_PROJECT_ID }})
          echo "service_url=${URL}" >> "$GITHUB_OUTPUT"
          curl -sf "${URL}/health" || echo "Health check pending (service may need cold start)"

  trigger-e2e:
    name: Trigger E2E Tests
    needs: deploy-qa
    if: github.ref == 'refs/heads/develop' && inputs.skip-e2e != true
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: quanta-platform
          repositories: e2e-tests

      - name: Dispatch e2e tests
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: quanta-platform/e2e-tests
          event-type: run-e2e
          client-payload: |
            {
              "service": "${{ inputs.service-name }}",
              "image_tag": "${{ github.sha }}",
              "trigger_repo": "${{ github.repository }}",
              "trigger_run_id": "${{ github.run_id }}",
              "trigger_sha": "${{ github.sha }}"
            }

  promote-to-main:
    name: Create PR to Main
    needs: trigger-e2e
    if: github.ref == 'refs/heads/develop' && inputs.skip-promote != true
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: quanta-platform

      - name: Wait for e2e results
        uses: actions/github-script@v7
        id: e2e-status
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          result-encoding: string
          script: |
            // Poll the e2e-tests repo for a workflow run triggered by our dispatch
            const owner = 'quanta-platform';
            const repo = 'e2e-tests';
            const maxAttempts = 60; // 30 minutes (30s intervals)
            let attempt = 0;

            // Wait briefly for the dispatch to register
            await new Promise(r => setTimeout(r, 15000));

            // Find the workflow run triggered by our dispatch
            let runId = null;
            for (let i = 0; i < 5; i++) {
              const { data: runs } = await github.rest.actions.listWorkflowRunsForRepo({
                owner, repo,
                event: 'repository_dispatch',
                per_page: 5,
              });
              const match = runs.workflow_runs.find(r =>
                r.created_at > new Date(Date.now() - 120000).toISOString()
              );
              if (match) { runId = match.id; break; }
              await new Promise(r => setTimeout(r, 10000));
            }

            if (!runId) {
              core.setFailed('Could not find e2e workflow run after dispatch');
              return 'failure';
            }

            core.info(`Found e2e run: ${runId}`);

            // Poll until complete
            while (attempt < maxAttempts) {
              const { data: run } = await github.rest.actions.getWorkflowRun({
                owner, repo, run_id: runId,
              });

              if (run.status === 'completed') {
                if (run.conclusion === 'success') {
                  core.info('E2E tests passed');
                  return 'success';
                } else {
                  core.setFailed(`E2E tests failed: ${run.conclusion}`);
                  return 'failure';
                }
              }

              attempt++;
              await new Promise(r => setTimeout(r, 30000));
            }

            core.setFailed('E2E tests timed out after 30 minutes');
            return 'failure';

      - uses: actions/checkout@v4
        if: steps.e2e-status.outputs.result == 'success'
        with:
          fetch-depth: 0

      - name: Create and merge PR develop → main
        if: steps.e2e-status.outputs.result == 'success'
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Check for existing open PR
            const { data: pulls } = await github.rest.pulls.list({
              owner, repo,
              head: `${owner}:develop`,
              base: 'main',
              state: 'open',
            });

            let prNumber;
            if (pulls.length > 0) {
              prNumber = pulls[0].number;
              core.info(`PR already exists: #${prNumber}`);
            } else {
              const { data: pr } = await github.rest.pulls.create({
                owner, repo,
                title: `release: promote ${repo} to production`,
                head: 'develop',
                base: 'main',
                body: [
                  '## Auto-generated promotion PR',
                  '',
                  `Service: \`${{ inputs.service-name }}\``,
                  `Image tag: \`${{ github.sha }}\``,
                  `E2E tests: passed`,
                  `Triggered by: ${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`,
                ].join('\n'),
              });
              prNumber = pr.number;
              core.info(`Created PR #${prNumber}`);
            }

            // Auto-merge the promotion PR
            core.info(`Merging PR #${prNumber}...`);
            await github.rest.pulls.merge({
              owner, repo,
              pull_number: prNumber,
              merge_method: 'squash',
              commit_title: `release: promote ${repo} to production (#${prNumber})`,
              commit_message: [
                `Service: ${{ inputs.service-name }}`,
                `Image tag: ${{ github.sha }}`,
                `E2E tests: passed`,
                `Triggered by: ${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`,
              ].join('\n'),
            });
            core.info(`PR #${prNumber} merged successfully`);

  deploy-prod:
    name: Deploy to Production
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_PROD_SA_KEY }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ inputs.service-name }}
          image: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROD_PROJECT_ID }}/quanta-docker/${{ inputs.service-name }}:${{ github.sha }}
          region: ${{ secrets.GCP_REGION }}

      - name: Verify deployment
        run: |
          URL=$(gcloud run services describe ${{ inputs.service-name }} --region=${{ secrets.GCP_REGION }} --format='value(status.url)' --project=${{ secrets.GCP_PROD_PROJECT_ID }})
          curl -sf "${URL}/health" || echo "Health check pending (service may need cold start)"

  cleanup-images:
    name: Cleanup Old Images
    needs: [deploy-qa, deploy-prod]
    if: always() && (needs.deploy-qa.result == 'success' || needs.deploy-prod.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "project_id=${{ secrets.GCP_PROD_PROJECT_ID }}" >> "$GITHUB_OUTPUT"
          else
            echo "project_id=${{ secrets.GCP_QA_PROJECT_ID }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ github.ref == 'refs/heads/main' && secrets.GCP_PROD_SA_KEY || secrets.GCP_QA_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Purge old images (keep 3 most recent)
        run: |
          REPO="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ steps.env.outputs.project_id }}/quanta-docker/${{ inputs.service-name }}"

          # List all tags sorted by upload time (newest first), skip 'latest'
          TAGS=$(gcloud artifacts docker tags list "${REPO}" \
            --sort-by="~UPDATE_TIME" \
            --format="value(tag)" \
            --filter="tag != latest" 2>/dev/null || true)

          # Keep the 3 most recent, delete the rest
          COUNT=0
          while IFS= read -r TAG; do
            [ -z "${TAG}" ] && continue
            COUNT=$((COUNT + 1))
            if [ "${COUNT}" -gt 3 ]; then
              echo "Deleting old image: ${REPO}:${TAG}"
              gcloud artifacts docker images delete "${REPO}:${TAG}" --quiet --delete-tags 2>/dev/null || true
            fi
          done <<< "${TAGS}"

          echo "Cleanup complete. Kept 3 most recent tags + latest."
